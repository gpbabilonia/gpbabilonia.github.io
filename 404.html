<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Guada Babilonia</title>
<link rel="icon" type="image/png" href="tabicon_nb.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #fff8e7;
    --dark: #1a1610;
    --dark2: #2c2519;
    --amber: #c8892a;
    --amber-light: #e8a83a;
    --muted: #6b5f45;
    --border: rgba(255,248,231,0.12);
  }
  html, body { height: 100%; }
  body { background: var(--dark); color: var(--cream); font-family: 'DM Sans', sans-serif; font-weight: 300; line-height: 1.7; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
  a { color: inherit; text-decoration: none; }

  .error-num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(6rem, 20vw, 12rem);
    color: var(--dark2);
    letter-spacing: -0.04em;
    line-height: 1;
    user-select: none;
  }
  .error-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1.5rem;
  }
  .error-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 400;
    margin-bottom: 1rem;
    color: var(--cream);
  }
  .error-body {
    font-size: 0.9rem;
    color: var(--muted);
    max-width: 360px;
    margin: 0 auto 2.5rem;
    line-height: 1.8;
  }
  .btn {
    display: inline-block;
    padding: 0.75rem 2rem;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 0.5px solid var(--amber);
    color: var(--amber);
    border-radius: 1px;
    transition: background 0.2s, color 0.2s;
  }
  .btn:hover {
    background: var(--amber);
    color: var(--dark);
  }
  .divider {
    width: 1px;
    height: 3rem;
    background: var(--border);
    margin: 0 auto 2rem;
  }
</style>
</head>
<body>

  <div class="error-num">404</div>
  <div class="divider"></div>
  <div class="error-label">Page not found</div>
  <h1 class="error-title">You wandered off the trail.</h1>
  <p class="error-body">The page you're looking for doesn't exist — it may have moved, or the link might be wrong. Head back and let's get you oriented.</p>
  <a href="/" class="btn">Back to home</a>

</body>
</html>
